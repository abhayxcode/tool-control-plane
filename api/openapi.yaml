openapi: 3.1.0
info:
  title: Tool Control Plane API
  version: 0.1.0
  description: Governed tool gateway for AI agents with policy, approvals, audit, and provider adapters.
servers:
  - url: http://localhost:4100
security:
  - bearerAuth: []
paths:
  /openapi.yaml:
    get:
      summary: Download OpenAPI contract
      operationId: getOpenAPIContract
      responses:
        "200":
          description: OpenAPI YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /healthz:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /mcp:
    post:
      summary: MCP JSON-RPC endpoint
      description: Supports initialize, tools/list, tools/call, resources/list, and resources/read over JSON-RPC 2.0.
      operationId: callMCP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPJSONRPCRequest"
      responses:
        "200":
          description: MCP JSON-RPC response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPJSONRPCResponse"
        "204":
          description: Notification accepted with no response body.
  /v1/capabilities:
    get:
      summary: List registered tool capabilities
      operationId: listCapabilities
      responses:
        "200":
          description: Capability IDs and metadata.
          content:
            application/json:
              schema:
                type: object
                required: [capabilities, details]
                properties:
                  capabilities:
                    type: array
                    items:
                      type: string
                  details:
                    type: array
                    items:
                      $ref: "#/components/schemas/CapabilityDefinition"
                  provider_config:
                    $ref: "#/components/schemas/ProviderConfig"
  /v1/connectors:
    get:
      summary: List configured and registered connectors
      operationId: listConnectors
      responses:
        "200":
          description: Connector inventory without raw secret values.
          content:
            application/json:
              schema:
                type: object
                required: [connectors]
                properties:
                  connectors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Connector"
    post:
      summary: Register connector metadata
      description: Stores non-secret connector metadata for internal alpha. It does not hot-swap provider adapters in the current process.
      operationId: createConnector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectorCreateRequest"
      responses:
        "201":
          description: Connector metadata was registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"
        "400":
          description: Invalid connector request.
  /v1/policies:
    get:
      summary: List loaded policy rules
      operationId: listPolicies
      responses:
        "200":
          description: Policy source metadata and ordered rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListResponse"
  /v1/readiness:
    get:
      summary: Readiness check for provider and store configuration
      operationId: getReadiness
      responses:
        "200":
          description: Readiness status and non-secret configuration checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/tool-calls:
    get:
      summary: List stored tool call records
      operationId: listToolCalls
      responses:
        "200":
          description: Ordered tool call records with redacted arguments and results.
          content:
            application/json:
              schema:
                type: object
                required: [tool_calls]
                properties:
                  tool_calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/ToolCallRecord"
    post:
      summary: Execute or request approval for a governed tool call
      operationId: callTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCallRequest"
      responses:
        "200":
          description: Tool call result, policy denial, validation error, or approval request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCallResponse"
        "400":
          description: Invalid JSON request body.
  /v1/tool-calls/{id}:
    get:
      summary: Get one stored tool call record
      operationId: getToolCall
      parameters:
        - $ref: "#/components/parameters/ToolCallID"
      responses:
        "200":
          description: Tool call record with redacted arguments and results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCallRecord"
        "404":
          description: Tool call record was not found.
  /v1/audit:
    get:
      summary: List audit entries
      operationId: listAuditEntries
      responses:
        "200":
          description: Ordered audit entries.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"
  /v1/audit/export:
    get:
      summary: Export audit, tool call records, and approvals
      operationId: exportAuditBundle
      responses:
        "200":
          description: Governance export bundle for review and evaluation pipelines.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditExportResponse"
  /v1/approvals:
    get:
      summary: List approval requests
      operationId: listApprovals
      responses:
        "200":
          description: Ordered approval requests.
          content:
            application/json:
              schema:
                type: object
                required: [approvals]
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalRequest"
  /v1/approvals/{id}:
    get:
      summary: Get one approval request
      operationId: getApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      responses:
        "200":
          description: Approval request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/grant:
    post:
      summary: Grant a pending approval request
      operationId: grantApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"
        "400":
          description: Invalid JSON request body.
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/deny:
    post:
      summary: Deny a pending approval request
      operationId: denyApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"
        "400":
          description: Invalid JSON request body.
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/execute:
    post:
      summary: Execute a granted approval request once
      operationId: executeApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      responses:
        "200":
          description: Execution result or blocked response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalExecuteResponse"
        "404":
          description: Approval was not found.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ApprovalID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: approval_000001
    ToolCallID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: tool_call_000001
  schemas:
    JSONValue:
      description: Arbitrary JSON value.
    JSONObject:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/JSONValue"
    MCPJSONRPCRequest:
      type: object
      required: [jsonrpc, method]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        method:
          type: string
          example: tools/list
        params:
          $ref: "#/components/schemas/JSONObject"
    MCPJSONRPCResponse:
      type: object
      required: [jsonrpc]
      properties:
        jsonrpc:
          type: string
          const: "2.0"
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        result:
          $ref: "#/components/schemas/JSONValue"
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string
    CapabilityDefinition:
      type: object
      required: [id, capability, action, risk_level, provider, description, approval_required]
      properties:
        id:
          type: string
          example: ci.get_checks
        capability:
          type: string
          example: ci
        action:
          type: string
          example: get_checks
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        provider:
          type: string
          example: mock
        description:
          type: string
        approval_required:
          type: boolean
    Connector:
      type: object
      required: [id, org_id, provider, capability, status]
      properties:
        id:
          type: string
          example: connector_000001
        org_id:
          type: string
          example: default
        name:
          type: string
          example: GitHub code_host
        provider:
          type: string
          example: github
        capability:
          type: string
          example: code_host
        config:
          $ref: "#/components/schemas/JSONObject"
        secret_ref:
          type: string
          example: env:GITHUB_TOKEN
        status:
          type: string
          enum: [configured, ready, blocked, disabled]
        source:
          type: string
          enum: [api, env, default]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ConnectorCreateRequest:
      type: object
      required: [org_id, provider, capability]
      properties:
        org_id:
          type: string
          example: default
        name:
          type: string
        provider:
          type: string
          example: github
        capability:
          type: string
          example: code_host
        config:
          $ref: "#/components/schemas/JSONObject"
        secret_ref:
          type: string
          example: env:GITHUB_TOKEN
        status:
          type: string
          enum: [configured, ready, blocked, disabled]
    PolicyListResponse:
      type: object
      required: [source, policy_file_set, rule_count, rules]
      properties:
        source:
          type: string
          enum: [static, file]
        policy_file_set:
          type: boolean
        rule_count:
          type: integer
        rules:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRule"
    PolicyRule:
      type: object
      required: [id, effect, match]
      properties:
        id:
          type: string
          example: require-prod-write-approval
        effect:
          type: string
          enum: [allow, deny, require_approval]
        reason:
          type: string
        match:
          $ref: "#/components/schemas/PolicyRuleMatch"
    PolicyRuleMatch:
      type: object
      properties:
        org_id:
          type: string
          example: default
        actor_user_id:
          type: string
          example: u_123
        service_id:
          type: string
          example: backend
        environment:
          type: string
          example: prod
        capability:
          type: string
          example: deploy
        action:
          type: string
          example: rollback
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        provider:
          type: string
          example: github
    ProviderConfig:
      type: object
      required: [code_provider, deploy_provider, errors_provider, metrics_provider, runtime_provider, docs_provider, internal_api_provider, github_selected, github_auth_mode, github_token_configured, github_app_configured, github_base_url_set, sentry_selected, sentry_token_configured, prometheus_selected, prometheus_base_url_set, prometheus_token_configured, kubernetes_selected, kubernetes_base_url_set, kubernetes_token_configured, generic_http_selected, generic_http_base_url_set, generic_http_token_configured, secret_broker, store, ready, warnings]
      properties:
        code_provider:
          type: string
          example: github
        deploy_provider:
          type: string
          example: github
        errors_provider:
          type: string
          example: sentry
        metrics_provider:
          type: string
          example: prometheus
        runtime_provider:
          type: string
          example: kubernetes
        docs_provider:
          type: string
          example: github
        internal_api_provider:
          type: string
          example: generic_http
        github_selected:
          type: boolean
        github_auth_mode:
          type: string
          enum: [none, token, github_app]
        github_token_configured:
          type: boolean
        github_app_configured:
          type: boolean
        github_base_url_set:
          type: boolean
        sentry_selected:
          type: boolean
        sentry_token_configured:
          type: boolean
        sentry_base_url_set:
          type: boolean
        sentry_default_org_set:
          type: boolean
        sentry_default_project_set:
          type: boolean
        prometheus_selected:
          type: boolean
        prometheus_base_url_set:
          type: boolean
        prometheus_token_configured:
          type: boolean
        prometheus_service_label:
          type: string
          example: service
        prometheus_environment_label:
          type: string
          example: environment
        prometheus_status_label:
          type: string
          example: status
        kubernetes_selected:
          type: boolean
        kubernetes_base_url_set:
          type: boolean
        kubernetes_token_configured:
          type: boolean
        kubernetes_namespace:
          type: string
          example: prod
        kubernetes_label_selector:
          type: string
          example: app=backend
        kubernetes_service_label:
          type: string
          example: app
        kubernetes_environment_label:
          type: string
          example: environment
        generic_http_selected:
          type: boolean
        generic_http_base_url_set:
          type: boolean
        generic_http_token_configured:
          type: boolean
        generic_http_allowed_methods:
          type: array
          items:
            type: string
          example: [GET]
        generic_http_timeout_ms:
          type: integer
          example: 10000
        generic_http_max_response_bytes:
          type: integer
          example: 65536
        demo_repository:
          type: string
          example: acme/backend
        secret_broker:
          type: string
          enum: [local, custom]
          example: local
        store:
          type: string
          example: sqlite
        ready:
          type: boolean
        warnings:
          type: array
          items:
            type: string
    ReadinessResponse:
      type: object
      required: [status, capability_count, blockers, checks]
      properties:
        status:
          type: string
          enum: [ok, blocked]
        capability_count:
          type: integer
        blockers:
          type: array
          items:
            type: string
        checks:
          type: object
          required: [capability_registry_loaded, provider_config, repository_access, store, auth_required, rate_limit_configured]
          properties:
            capability_registry_loaded:
              type: boolean
            provider_config:
              $ref: "#/components/schemas/ProviderConfig"
            repository_access:
              type: object
              required: [status, repository]
              properties:
                status:
                  type: string
                  enum: [ok, skipped, blocked]
                repository:
                  type: string
                  example: acme/backend
                reason:
                  type: string
            store:
              type: string
            auth_required:
              type: boolean
            rate_limit_configured:
              type: boolean
            policy:
              $ref: "#/components/schemas/PolicyListResponse"
    ToolCallRequest:
      type: object
      required: [org_id, actor_user_id, agent_run_id, service_id, environment, capability, action]
      properties:
        org_id:
          type: string
        request_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        arguments:
          $ref: "#/components/schemas/JSONObject"
    ToolCallResponse:
      type: object
      required: [status, risk_level]
      properties:
        status:
          type: string
          enum: [success, denied, invalid, approval_required, error]
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        provider:
          type: string
        route_trace:
          $ref: "#/components/schemas/ProviderRouteTrace"
        result:
          $ref: "#/components/schemas/JSONObject"
        reason:
          type: string
        error:
          $ref: "#/components/schemas/ToolCallError"
        approval_required:
          type: boolean
        approval_request_id:
          type: string
    ToolCallError:
      type: object
      required: [retryable]
      properties:
        provider:
          type: string
        category:
          type: string
        operation:
          type: string
        status_code:
          type: integer
        attempts:
          type: integer
        retryable:
          type: boolean
        message:
          type: string
    ToolCallRecord:
      type: object
      required:
        - id
        - at
        - org_id
        - actor_user_id
        - agent_run_id
        - service_id
        - environment
        - capability
        - action
        - risk_level
        - decision
        - status
      properties:
        id:
          type: string
          example: tool_call_000001
        at:
          type: string
          format: date-time
        request_id:
          type: string
        org_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        arguments:
          $ref: "#/components/schemas/JSONObject"
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        decision:
          type: string
          enum: [allowed, denied, invalid, approval_required, approved_executed]
        provider:
          type: string
        route_trace:
          $ref: "#/components/schemas/ProviderRouteTrace"
        status:
          type: string
          enum: [success, denied, invalid, approval_required, error]
        reason:
          type: string
        error:
          $ref: "#/components/schemas/ToolCallError"
        approval_request_id:
          type: string
        result:
          $ref: "#/components/schemas/JSONObject"
    ProviderRouteTrace:
      type: object
      required: [capability_id, selected_provider, selected_adapter_available, reason]
      properties:
        capability_id:
          type: string
          example: metrics.get_service_health
        selected_provider:
          type: string
          example: prometheus
        selected_adapter_available:
          type: boolean
        alternative_providers:
          type: array
          items:
            type: string
          example: [mock]
        reason:
          type: string
          example: Capability metrics.get_service_health is registered with provider prometheus.
    AuditEntry:
      type: object
      required:
        - at
        - org_id
        - actor_user_id
        - agent_run_id
        - service_id
        - environment
        - capability
        - action
        - risk_level
        - decision
      properties:
        at:
          type: string
          format: date-time
        request_id:
          type: string
        org_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        decision:
          type: string
          enum: [allowed, denied, invalid, approval_required, approved_executed]
        approval_request_id:
          type: string
    ApprovalRequest:
      type: object
      required:
        - id
        - status
        - executed
        - org_id
        - actor_user_id
        - agent_run_id
        - service_id
        - environment
        - capability
        - action
        - risk_level
        - reason
        - requested_at
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, granted, denied]
        executed:
          type: boolean
        org_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        arguments:
          $ref: "#/components/schemas/JSONObject"
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        decided_by:
          type: string
        decision_note:
          type: string
        executed_at:
          type: string
          format: date-time
    ApprovalDecisionRequest:
      type: object
      required: [actor_user_id]
      properties:
        actor_user_id:
          type: string
        reason:
          type: string
    ApprovalDecisionResponse:
      type: object
      required: [status, approval]
      properties:
        status:
          type: string
          enum: [pending, granted, denied]
        approval:
          $ref: "#/components/schemas/ApprovalRequest"
    ApprovalExecuteResponse:
      type: object
      required: [status, approval]
      properties:
        status:
          type: string
          enum: [approved_executed, blocked, error]
        approval:
          $ref: "#/components/schemas/ApprovalRequest"
        tool_call:
          $ref: "#/components/schemas/ToolCallResponse"
        reason:
          type: string
    AuditExportResponse:
      type: object
      required: [schema_version, exported_at, audit, tool_calls, approvals]
      properties:
        schema_version:
          type: string
          example: 2026-07-16.alpha1
        exported_at:
          type: string
          format: date-time
        audit:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCallRecord"
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"
    RiskLevel:
      type: string
      enum: [unknown, read, write_low, write_high]
