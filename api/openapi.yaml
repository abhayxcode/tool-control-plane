openapi: 3.1.0
info:
  title: Tool Control Plane API
  version: 0.1.0
  description: Governed tool gateway for AI agents with policy, approvals, audit, and provider adapters.
servers:
  - url: http://localhost:4100
security:
  - bearerAuth: []
paths:
  /openapi.yaml:
    get:
      summary: Download OpenAPI contract
      operationId: getOpenAPIContract
      responses:
        "200":
          description: OpenAPI YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /healthz:
    get:
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /v1/capabilities:
    get:
      summary: List registered tool capabilities
      operationId: listCapabilities
      responses:
        "200":
          description: Capability IDs and metadata.
          content:
            application/json:
              schema:
                type: object
                required: [capabilities, details]
                properties:
                  capabilities:
                    type: array
                    items:
                      type: string
                  details:
                    type: array
                    items:
                      $ref: "#/components/schemas/CapabilityDefinition"
                  provider_config:
                    $ref: "#/components/schemas/ProviderConfig"
  /v1/readiness:
    get:
      summary: Readiness check for provider and store configuration
      operationId: getReadiness
      responses:
        "200":
          description: Readiness status and non-secret configuration checks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/tool-calls:
    post:
      summary: Execute or request approval for a governed tool call
      operationId: callTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCallRequest"
      responses:
        "200":
          description: Tool call result, policy denial, validation error, or approval request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCallResponse"
        "400":
          description: Invalid JSON request body.
  /v1/audit:
    get:
      summary: List audit entries
      operationId: listAuditEntries
      responses:
        "200":
          description: Ordered audit entries.
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"
  /v1/approvals:
    get:
      summary: List approval requests
      operationId: listApprovals
      responses:
        "200":
          description: Ordered approval requests.
          content:
            application/json:
              schema:
                type: object
                required: [approvals]
                properties:
                  approvals:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApprovalRequest"
  /v1/approvals/{id}:
    get:
      summary: Get one approval request
      operationId: getApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      responses:
        "200":
          description: Approval request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/grant:
    post:
      summary: Grant a pending approval request
      operationId: grantApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"
        "400":
          description: Invalid JSON request body.
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/deny:
    post:
      summary: Deny a pending approval request
      operationId: denyApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: Updated approval decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionResponse"
        "400":
          description: Invalid JSON request body.
        "404":
          description: Approval was not found.
  /v1/approvals/{id}/execute:
    post:
      summary: Execute a granted approval request once
      operationId: executeApproval
      parameters:
        - $ref: "#/components/parameters/ApprovalID"
      responses:
        "200":
          description: Execution result or blocked response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalExecuteResponse"
        "404":
          description: Approval was not found.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ApprovalID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: approval_000001
  schemas:
    JSONValue:
      description: Arbitrary JSON value.
    JSONObject:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/JSONValue"
    CapabilityDefinition:
      type: object
      required: [id, capability, action, risk_level, provider, description, approval_required]
      properties:
        id:
          type: string
          example: ci.get_checks
        capability:
          type: string
          example: ci
        action:
          type: string
          example: get_checks
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        provider:
          type: string
          example: mock
        description:
          type: string
        approval_required:
          type: boolean
    ProviderConfig:
      type: object
      required: [code_provider, deploy_provider, errors_provider, github_selected, github_auth_mode, github_token_configured, github_app_configured, github_base_url_set, sentry_selected, sentry_token_configured, store, ready, warnings]
      properties:
        code_provider:
          type: string
          example: github
        deploy_provider:
          type: string
          example: github
        errors_provider:
          type: string
          example: sentry
        github_selected:
          type: boolean
        github_auth_mode:
          type: string
          enum: [none, token, github_app]
        github_token_configured:
          type: boolean
        github_app_configured:
          type: boolean
        github_base_url_set:
          type: boolean
        sentry_selected:
          type: boolean
        sentry_token_configured:
          type: boolean
        sentry_base_url_set:
          type: boolean
        sentry_default_org_set:
          type: boolean
        sentry_default_project_set:
          type: boolean
        demo_repository:
          type: string
          example: acme/backend
        store:
          type: string
          example: sqlite
        ready:
          type: boolean
        warnings:
          type: array
          items:
            type: string
    ReadinessResponse:
      type: object
      required: [status, capability_count, blockers, checks]
      properties:
        status:
          type: string
          enum: [ok, blocked]
        capability_count:
          type: integer
        blockers:
          type: array
          items:
            type: string
        checks:
          type: object
          required: [capability_registry_loaded, provider_config, repository_access, store, auth_required, rate_limit_configured]
          properties:
            capability_registry_loaded:
              type: boolean
            provider_config:
              $ref: "#/components/schemas/ProviderConfig"
            repository_access:
              type: object
              required: [status, repository]
              properties:
                status:
                  type: string
                  enum: [ok, skipped, blocked]
                repository:
                  type: string
                  example: acme/backend
                reason:
                  type: string
            store:
              type: string
            auth_required:
              type: boolean
            rate_limit_configured:
              type: boolean
    ToolCallRequest:
      type: object
      required: [org_id, actor_user_id, agent_run_id, service_id, environment, capability, action]
      properties:
        org_id:
          type: string
        request_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        arguments:
          $ref: "#/components/schemas/JSONObject"
    ToolCallResponse:
      type: object
      required: [status, risk_level]
      properties:
        status:
          type: string
          enum: [success, denied, invalid, approval_required, error]
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        provider:
          type: string
        result:
          $ref: "#/components/schemas/JSONObject"
        reason:
          type: string
        error:
          $ref: "#/components/schemas/ToolCallError"
        approval_required:
          type: boolean
        approval_request_id:
          type: string
    ToolCallError:
      type: object
      required: [retryable]
      properties:
        provider:
          type: string
        category:
          type: string
        operation:
          type: string
        status_code:
          type: integer
        attempts:
          type: integer
        retryable:
          type: boolean
        message:
          type: string
    AuditEntry:
      type: object
      required:
        - at
        - org_id
        - actor_user_id
        - agent_run_id
        - service_id
        - environment
        - capability
        - action
        - risk_level
        - decision
      properties:
        at:
          type: string
          format: date-time
        request_id:
          type: string
        org_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        decision:
          type: string
          enum: [allowed, denied, invalid, approval_required, approved_executed]
        approval_request_id:
          type: string
    ApprovalRequest:
      type: object
      required:
        - id
        - status
        - executed
        - org_id
        - actor_user_id
        - agent_run_id
        - service_id
        - environment
        - capability
        - action
        - risk_level
        - reason
        - requested_at
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, granted, denied]
        executed:
          type: boolean
        org_id:
          type: string
        actor_user_id:
          type: string
        agent_run_id:
          type: string
        service_id:
          type: string
        environment:
          type: string
        capability:
          type: string
        action:
          type: string
        arguments:
          $ref: "#/components/schemas/JSONObject"
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        reason:
          type: string
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        decided_by:
          type: string
        decision_note:
          type: string
        executed_at:
          type: string
          format: date-time
    ApprovalDecisionRequest:
      type: object
      required: [actor_user_id]
      properties:
        actor_user_id:
          type: string
        reason:
          type: string
    ApprovalDecisionResponse:
      type: object
      required: [status, approval]
      properties:
        status:
          type: string
          enum: [pending, granted, denied]
        approval:
          $ref: "#/components/schemas/ApprovalRequest"
    ApprovalExecuteResponse:
      type: object
      required: [status, approval]
      properties:
        status:
          type: string
          enum: [approved_executed, blocked, error]
        approval:
          $ref: "#/components/schemas/ApprovalRequest"
        tool_call:
          $ref: "#/components/schemas/ToolCallResponse"
        reason:
          type: string
    RiskLevel:
      type: string
      enum: [unknown, read, write_low, write_high]
